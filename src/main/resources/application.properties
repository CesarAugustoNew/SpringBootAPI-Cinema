spring.application.name=Filmes

# servidor TOMCAT
serve.port=8080

#configuração do bando de dados
spring.datasource.url=jdbc:postgresql://${pgHOST}:${pgPORT}/${pgDATABASE}?&sslmode=require
spring.datasource.username=${pgUSER}
spring.datasource.password=${pgPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

#Spring JPA / HIBERNATE
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Swagger

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

#JWT
jwt.secret=${JWT_SECRET:cinema-reserva-jwt-chave-secreta-muito-segura-256-bits-ou-mais-longa-aqui}
jwt.expiration=86400000